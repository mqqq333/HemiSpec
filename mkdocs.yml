site_name: HemiSpec
site_description: Reconstruction-derived hemispheric specificity analysis toolkit and workflow documentation.
site_url: https://mqqq333.github.io/HemiSpec/
repo_url: https://github.com/mqqq333/HemiSpec
repo_name: mqqq333/HemiSpec
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode


extra:
  generator: false

extra_css:
  - assets/stylesheets/extra.css
plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Get started: 快速入门
            Installation: 安装
            Quick start: 快速开始
            Data and models: 数据与模型
            Methods: 方法
            Overview: 概述
            Reconstruction framework: 重建框架
            ANS and RNS metrics: ANS/RNS 指标
            Downstream task analysis: 下游任务分析
            Reference: 参考手册
            CLI: 命令行
            Python API: Python API
            Outputs: 输出
            Release artifacts: 发布产物
            Citation: 引用
            Developer: 开发者
            Architecture: 架构
            Project structure: 项目结构
            Developer guide: 开发指南
            API design: API 设计
            Deployment: 部署
            DGN model bundles: DGN 模型包
            TRT and classifier: TRT 与分类器
            Roadmap: 路线图
            Release verification v0.1.0: v0.1.0 发布验证

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Get started:
      - Installation: installation.md
      - Quick start: quickstart.md
      - Data and models: data-and-models.md
  - Methods:
      - Overview: methods/index.md
      - Reconstruction framework: methods/reconstruction-framework.md
      - ANS and RNS metrics: methods/ans-rns-metrics.md
      - Downstream task analysis: methods/downstream-task-analysis.md
  - Reference:
      - CLI: reference/cli.md
      - Python API: reference/python-api.md
      - Outputs: reference/outputs.md
      - Release artifacts: release-artifacts.md
      - Citation: citation.md
  - Developer:
      - Overview: developer/index.md
      - Architecture: developer/architecture.md
      - Project structure: developer/project-structure.md
      - Developer guide: developer/developer-guide.md
      - API design: developer/api-design.md
      - Deployment: developer/deployment.md
      - DGN model bundles: developer/dgn-model-bundle.md
      - TRT and classifier: developer/trt-and-classifier-tasks.md
      - Roadmap: developer/roadmap.md
      - Release verification v0.1.0: developer/release-verification-v0.1.0.md


