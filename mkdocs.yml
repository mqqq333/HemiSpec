site_name: HemiSpec
site_description: Reconstruction-derived hemispheric specificity analysis toolkit and workflow documentation.
site_url: https://mqqq333.github.io/HemiSpec/
repo_url: https://github.com/mqqq333/HemiSpec
repo_name: mqqq333/HemiSpec
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode


extra:
  generator: false

extra_css:
  - assets/stylesheets/extra.css
plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick start: quickstart.md
  - Software overview: software-overview.md
  - Methods:
      - Overview: methods/index.md
      - Reconstruction framework: methods/reconstruction-framework.md
      - ANS and RNS metrics: methods/ans-rns-metrics.md
      - Handedness extension: methods/handedness-extension.md
  - Tutorials:
      - Overview: tutorials/index.md
      - DGN inference: tutorials/dgn-inference.md
      - Compute specificity maps: tutorials/compute-specificity.md
      - Handedness workflow: tutorials/handedness-workflow.md
      - Model-enabled DGN workflow: tutorials/model-enabled-dgn-workflow.md
  - Reference:
      - Overview: reference/index.md
      - CLI: reference/cli.md
      - Python API: reference/python-api.md
      - Outputs: reference/outputs.md
      - Model bundles: reference/model-bundles.md
      - Asset bundles: reference/asset-bundle.md
  - Developer:
      - Overview: developer/index.md
      - Architecture: developer/architecture.md
      - Project structure: developer/project-structure.md
      - Developer guide: developer/developer-guide.md
      - API design: developer/api-design.md
      - Deployment: developer/deployment.md
      - DGN model bundles: developer/dgn-model-bundle.md
      - GUI design: developer/gui-design.md
      - GUI user guide zh: developer/gui-user-guide-zh.md
      - Local model deployment zh: developer/local-model-deployment-zh.md
      - Methods and metrics zh: developer/methods-and-metrics-zh.md
      - Outputs zh: developer/outputs-zh.md
      - TRT and classifier: developer/trt-and-classifier-tasks.md
      - Toolkit release artifacts: developer/toolkit-release-artifacts.md
      - Roadmap: developer/roadmap.md
      - v0.1.0 release verification: developer/release-verification-v0.1.0.md
  - Release artifacts: release-artifacts.md
  - Data and models: data-and-models.md
  - Manuscript figures: manuscript-figures.md
  - Citation: citation.md


