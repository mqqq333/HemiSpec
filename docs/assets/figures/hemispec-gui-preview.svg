<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">HemiSpec GUI schematic preview</title>
  <desc id="desc">Minimal public-safe schematic of the planned HemiSpec desktop workbench layout.</desc>
  <defs>
    <style>
      .bg{fill:#ffffff}.frame{fill:#f8fafc;stroke:#334155;stroke-width:1.5;rx:18}.top{fill:#e5e7eb}.side{fill:#1f2937}.nav{fill:#374151}.navActive{fill:#1f4e79}.h1{font:700 28px Arial,Helvetica,sans-serif;fill:#111827}.h2{font:700 17px Arial,Helvetica,sans-serif;fill:#111827}.p{font:400 13px Arial,Helvetica,sans-serif;fill:#4b5563}.sideText{font:700 14px Arial,Helvetica,sans-serif;fill:#f9fafb}.sideSmall{font:400 12px Arial,Helvetica,sans-serif;fill:#cbd5e1}.card{fill:#ffffff;stroke:#cbd5e1;stroke-width:1.2;rx:10}.ok{fill:#e8f5e9;stroke:#2f6f4e}.warn{fill:#fff7ed;stroke:#b45309}.chip{font:700 11px Arial,Helvetica,sans-serif}.mono{font:400 12px Consolas,Menlo,monospace;fill:#334155}.note{font:400 12px Arial,Helvetica,sans-serif;fill:#64748b}.caption{font:400 13px Arial,Helvetica,sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="56" y="52" class="h1">HemiSpec desktop workbench</text>
  <text x="56" y="78" class="caption">Schematic preview for documentation; not a screenshot of real subject data.</text>
  <g transform="translate(56,104)">
    <rect class="frame" width="1168" height="560"/>
    <rect class="top" width="1168" height="48" rx="18"/>
    <text x="24" y="31" class="h2">HemiSpec Workbench</text>
    <rect x="980" y="12" width="132" height="24" rx="12" fill="#eef2ff" stroke="#1f4e79"/><text x="1007" y="29" class="chip" fill="#1f4e79">Lightweight</text>

    <rect class="side" y="48" width="220" height="512"/>
    <text x="24" y="92" class="sideText">Navigation</text>
    <rect class="navActive" x="18" y="118" width="184" height="34" rx="7"/><text x="36" y="140" class="sideText">Setup</text>
    <rect class="nav" x="18" y="162" width="184" height="34" rx="7"/><text x="36" y="184" class="sideText">Run</text>
    <rect class="nav" x="18" y="206" width="184" height="34" rx="7"/><text x="36" y="228" class="sideText">Inspect</text>
    <rect class="nav" x="18" y="250" width="184" height="34" rx="7"/><text x="36" y="272" class="sideText">Export</text>
    <rect class="nav" x="18" y="294" width="184" height="34" rx="7"/><text x="36" y="316" class="sideText">Advanced</text>
    <text x="24" y="516" class="sideSmall">All actions map to CLI/API calls.</text>

    <g transform="translate(252,82)">
      <text x="0" y="0" class="h1">Project setup</text>
      <text x="0" y="28" class="p">Validate inputs and local release assets before running a workflow.</text>
      <g transform="translate(0,58)">
        <rect class="card" width="260" height="122"/><text x="18" y="34" class="h2">Input GM maps</text><text x="18" y="60" class="p">Glob preview | subject count</text><rect class="ok" x="18" y="78" width="74" height="24" rx="12"/><text x="39" y="94" class="chip" fill="#166534">Ready</text>
      </g>
      <g transform="translate(288,58)">
        <rect class="card" width="260" height="122"/><text x="18" y="34" class="h2">DGN model assets</text><text x="18" y="60" class="p">L-&gt;R / R-&gt;L checkpoints</text><rect class="warn" x="18" y="78" width="118" height="24" rx="12"/><text x="35" y="94" class="chip" fill="#92400e">Manifest needed</text>
      </g>
      <g transform="translate(576,58)">
        <rect class="card" width="260" height="122"/><text x="18" y="34" class="h2">Atlas / labels</text><text x="18" y="60" class="p">Glasser atlas and label table</text><rect class="warn" x="18" y="78" width="108" height="24" rx="12"/><text x="34" y="94" class="chip" fill="#92400e">License TBD</text>
      </g>
      <g transform="translate(0,210)">
        <rect class="card" width="836" height="112"/><text x="18" y="34" class="h2">Equivalent CLI</text><text x="18" y="64" class="mono">hemispec workflow --input-glob "derivatives/*_GM_masked.nii.gz" --out-dir outputs/hemispec_workflow</text><text x="18" y="91" class="note">The GUI is a thin layer over the same public API used by the package and CLI.</text>
      </g>
      <g transform="translate(0,352)">
        <rect class="card" width="836" height="84"/><text x="18" y="34" class="h2">Run record</text><text x="18" y="60" class="p">Parameters, environment metadata, warnings, checksums, and output bundle paths.</text>
      </g>
    </g>
  </g>
</svg>
