name: Bug report
description: Report a reproducible problem in HemiSpec
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve HemiSpec. Please avoid uploading private MRI data, model weights, or subject-level outputs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Provide the smallest command, script, or synthetic example that reproduces the issue.
      placeholder: |
        hemispec --help
        hemispec compute ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, HemiSpec version/commit, and relevant optional dependencies.
      placeholder: |
        OS: Windows 11
        Python: 3.12
        HemiSpec: commit ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: text
