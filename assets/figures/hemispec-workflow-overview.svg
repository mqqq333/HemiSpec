<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="460" viewBox="0 0 1280 460" role="img" aria-labelledby="title desc">
  <title id="title">HemiSpec workflow overview</title>
  <desc id="desc">Minimal scientific workflow schematic aligned with the manuscript Fig. 1B logic: Input GM, Reconstruction, Difference analysis, and hemisphere-specific metrics.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M1,1 L9,5 L1,9 Z" fill="#1f4e79"/></marker>
    <style>
      .bg{fill:#ffffff}.title{font:700 30px Arial,Helvetica,sans-serif;fill:#111827}.subtitle{font:400 15px Arial,Helvetica,sans-serif;fill:#4b5563}.box{fill:#f8fafc;stroke:#334155;stroke-width:1.4;rx:10}.box2{fill:#eff6ff;stroke:#1f4e79;stroke-width:1.5;rx:10}.box3{fill:#f0fdf4;stroke:#2f6f4e;stroke-width:1.5;rx:10}.label{font:700 17px Arial,Helvetica,sans-serif;fill:#111827}.small{font:400 13px Arial,Helvetica,sans-serif;fill:#374151}.tiny{font:400 12px Arial,Helvetica,sans-serif;fill:#64748b}.arrow{stroke:#1f4e79;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.bracket{stroke:#94a3b8;stroke-width:1.5;fill:none;stroke-dasharray:5 5}
    </style>
  </defs>
  <rect class="bg" width="1280" height="460"/>
  <text x="52" y="56" class="title">HemiSpec workflow overview</text>
  <text x="52" y="84" class="subtitle">Aligned with the manuscript Fig. 1B logic: Input GM -> Reconstruction -> Difference analysis -> Hemisphere-specific metrics.</text>

  <g transform="translate(48,132)">
    <rect class="box" width="190" height="112"/>
    <text x="22" y="36" class="label">1. Input GM</text>
    <text x="22" y="64" class="small">Preprocessed gray-matter</text>
    <text x="22" y="84" class="small">maps in a common space</text>
  </g>
  <path class="arrow" d="M252 188 H312"/>

  <g transform="translate(326,132)">
    <rect class="box2" width="210" height="112"/>
    <text x="22" y="36" class="label">2. Reconstruction</text>
    <text x="22" y="64" class="small">Cross-hemispheric DGN</text>
    <text x="22" y="84" class="small">L-&gt;R and R-&gt;L estimates</text>
  </g>
  <path class="arrow" d="M550 188 H610"/>

  <g transform="translate(624,132)">
    <rect class="box2" width="214" height="112"/>
    <text x="22" y="36" class="label">3. Difference analysis</text>
    <text x="22" y="64" class="small">Compare actual GM with</text>
    <text x="22" y="84" class="small">contralateral reconstruction</text>
  </g>
  <path class="arrow" d="M852 188 H912"/>

  <g transform="translate(926,132)">
    <rect class="box3" width="240" height="112"/>
    <text x="22" y="36" class="label">4. Hemisphere-specific metrics</text>
    <text x="22" y="64" class="small">ANS and RNS maps</text>
    <text x="22" y="84" class="small">reconstruction-derived residuals</text>
  </g>

  <path class="bracket" d="M436 282 C436 328 900 328 900 282"/>
  <g transform="translate(320,344)">
    <rect class="box" width="640" height="74"/>
    <text x="22" y="31" class="label">Downstream HemiSpec Toolkit outputs</text>
    <text x="22" y="55" class="small">ROI features | TRT reliability | structural specificity | classifier validation | package / CLI / GUI / compiled app</text>
  </g>

  <text x="52" y="432" class="tiny">Method boundary: ANS/RNS and the original cross-hemispheric DGN framework are attributed to Wang et al. 2024; HemiSpec packages and extends the workflow for the current study and software.</text>
</svg>
